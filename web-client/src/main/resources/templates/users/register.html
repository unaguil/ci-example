<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register User</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5" style="max-width: 500px;">
  <h2>Register User</h2>
  <p class="text-muted">Calls <code>POST /users/add</code> on the server.</p>
  <form method="post" th:action="@{/users/register}" class="mt-3">
    <div class="mb-3">
      <label class="form-label">Login</label>
      <input type="text" name="login" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
    <a th:href="@{/}" class="btn btn-secondary ms-2">Back</a>
  </form>

  <div th:if="${result}" class="alert alert-success mt-4">
    Server response: <strong th:text="${result}"></strong>
    (user: <span th:text="${login}"></span>)
  </div>
</body>
</html>
