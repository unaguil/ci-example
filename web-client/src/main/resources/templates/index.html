<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPQ Web Client</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
  <h1>SPQ Server — Web Client</h1>
  <p class="text-muted">Demonstrates all REST API endpoints through a browser UI.</p>
  <ul class="list-group mt-4" style="max-width: 400px;">
    <li class="list-group-item"><a th:href="@{/users/register}">Register a user</a></li>
    <li class="list-group-item"><a th:href="@{/users/list}">View all users</a></li>
    <li class="list-group-item"><a th:href="@{/messages/post}">Post a message</a></li>
    <li class="list-group-item"><a th:href="@{/messages/list}">View messages by user</a></li>
  </ul>
</body>
</html>
