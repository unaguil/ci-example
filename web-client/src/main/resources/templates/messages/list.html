<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messages by User</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5" style="max-width: 600px;">
  <h2>Messages by User</h2>
  <p class="text-muted">Calls <code>GET /messages/all?login=</code> on the server.</p>
  <form method="post" th:action="@{/messages/list}" class="row g-2 align-items-center mb-4">
    <div class="col-auto">
      <input type="text" name="login" class="form-control" placeholder="Enter login" required>
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-primary">Search</button>
    </div>
    <div class="col-auto">
      <a th:href="@{/}" class="btn btn-secondary">Back</a>
    </div>
  </form>

  <div th:if="${messages}">
    <h5>Messages for: <span th:text="${login}"></span></h5>
    <ul class="list-group">
      <li class="list-group-item" th:each="msg : ${messages}" th:text="${msg.message}"></li>
      <li class="list-group-item text-muted" th:if="${#lists.isEmpty(messages)}">No messages found.</li>
    </ul>
  </div>
</body>
</html>
